<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trims Inventory | Reset</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f62fe;
      --primary-glow: #00d2ff;
      --cyan-accent: #00a4ef;
      --bg-gradient: linear-gradient(135deg, #02040a 0%, #0a0f29 100%);
      --glass-bg: rgba(15, 20, 35, 0.85);
      --glass-border: rgba(100, 150, 255, 0.15);
      --text-main: #ffffff;
      --text-muted: #8892b0;
      --panda-black: #1a1a1a;
      --panda-white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }

    body {
      background: var(--bg-gradient);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text-main);
      position: relative;
    }

    /* PARTICLES */
    .particles { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute; background: white; border-radius: 50%; opacity: 0.15;
      animation: float 10s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* PANDA WRAPPER */
    .guardian-wrapper {
      position: relative; width: 240px; height: 220px;
      margin-bottom: -60px; z-index: 1; 
      display: flex; justify-content: center;
    }

    svg.guardian {
      width: 100%; height: 100%; overflow: visible;
      stroke: white; stroke-width: 2.5px; 
      stroke-linejoin: round; stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.5));
    }

    /* PANDA PARTS */
    .p-body { fill: var(--panda-black); }
    .p-face-base { fill: var(--panda-white); stroke: var(--panda-black); stroke-width: 0; }
    .p-ear { fill: var(--panda-black); }
    .p-eye-patch { fill: var(--panda-black); }
    .p-eye-white { fill: white; stroke: none; }
    .p-pupil { fill: var(--primary-glow); stroke: none; transition: transform 0.1s ease-out; }
    .p-nose { fill: var(--panda-black); stroke: none; }
    .p-mouth { fill: none; stroke: var(--panda-black); stroke-width: 3; }
    .p-arm { 
      fill: var(--panda-black); stroke: white; stroke-width: 2.5px;
      transform-box: fill-box; transform-origin: 50% 90%; 
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .p-bamboo { opacity: 0; transform: translateY(20px); transition: all 0.5s ease; stroke: none; }

    /* STATES */
    .state-watching .p-pupil { transform: translateY(5px); }
    .state-covering .p-arm.left { transform: translateY(-60px) translateX(35px) rotate(40deg); }
    .state-covering .p-arm.right { transform: translateY(-60px) translateX(-35px) rotate(-40deg); }
    .state-success .p-bamboo { opacity: 1; transform: translateY(-20px); }
    .state-success .p-arm.right { transform: translateY(-40px) rotate(-20deg); } 
    .state-success .p-arm.left { transform: translateY(10px) rotate(-10deg); }

    /* CARD */
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 60px 32px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative; z-index: 10;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }

    .brand {
      font-size: 20px; font-weight: 800; color: white;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 4px; text-shadow: 0 0 10px rgba(15,98,254,0.5);
    }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; font-family: 'Inter', sans-serif; }

    /* FORM */
    .form-group { margin-bottom: 16px; text-align: left; width: 100%; }
    label { 
      display: block; margin-bottom: 6px; font-size: 10px; 
      font-weight: 700; color: var(--text-muted); text-transform: uppercase; 
      font-family: 'Inter', sans-serif;
    }
    
    input {
      width: 100%; height: 46px; padding: 0 16px;
      font-size: 15px; color: white; font-weight: bold;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    input:focus {
      outline: none; border-color: #fff; background: #000;
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 0 2px #000, 0 0 10px var(--cyan-accent);
    }

    /* BRUTALIST BUTTON */
    .brutalist-button {
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; width: 100%; height: 56px;
      background-color: #000; color: #fff; text-decoration: none;
      font-family: Arial, sans-serif; font-weight: bold;
      border: 3px solid #fff; outline: 3px solid #000;
      box-shadow: 6px 6px 0 var(--cyan-accent);
      transition: all 0.1s ease-out; padding: 0 15px;
      position: relative; overflow: hidden; margin-top: 15px;
    }
    .brutalist-button:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 #000; }
    .brutalist-button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--cyan-accent); background: #fff; color: #000; border-color: #000; }
    
    .button-text { display: flex; flex-direction: column; line-height: 1.2; position: relative; z-index: 1; transition: transform 0.2s; }
    .brutalist-button:hover .button-text { transform: skew(-5deg); }
    
    .button-text span:first-child { font-size: 10px; text-transform: uppercase; }
    .button-text span:last-child { font-size: 14px; text-transform: uppercase; }

    .error-msg {
      width: 100%; background: rgba(220, 50, 50, 0.2); color: #ff8080;
      font-size: 12px; padding: 10px; border-radius: 4px;
      margin-bottom: 20px; display: none; border: 1px solid rgba(220, 50, 50, 0.5);
      font-family: 'Inter', sans-serif;
    }

    .back-link { margin-top: 20px; font-size: 12px; color: #888; text-decoration: none; font-family: 'Inter', sans-serif; }
    .back-link:hover { color: #fff; }

  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="guardian-wrapper" id="guardian">
    <svg class="guardian" viewBox="0 0 240 220">
      <path class="p-body" d="M60,220 Q50,150 90,130 L150,130 Q190,150 180,220 Z" />
      <g class="p-head-group">
        <circle class="p-ear" cx="65" cy="65" r="18" />
        <circle class="p-ear" cx="175" cy="65" r="18" />
        <ellipse class="p-face-base" cx="120" cy="100" rx="65" ry="55" stroke="white" stroke-width="2.5" />
        <g class="p-eyes">
          <ellipse class="p-eye-patch" cx="95" cy="95" rx="16" ry="22" transform="rotate(-15 95 95)" />
          <ellipse class="p-eye-patch" cx="145" cy="95" rx="16" ry="22" transform="rotate(15 145 95)" />
          <circle class="p-eye-white" cx="95" cy="95" r="6" />
          <circle class="p-eye-white" cx="145" cy="95" r="6" />
          <g id="pupils">
            <circle class="p-pupil" cx="95" cy="95" r="2.5" />
            <circle class="p-pupil" cx="145" cy="95" r="2.5" />
          </g>
        </g>
        <path class="p-nose" d="M112,115 Q120,122 128,115 Q120,105 112,115" />
        <path class="p-mouth" d="M112,125 Q120,132 128,125" />
      </g>
      <g class="p-bamboo">
        <rect x="195" y="50" width="8" height="80" fill="#24a148" rx="2" transform="rotate(15 195 90)"/>
        <rect x="193" y="70" width="12" height="4" fill="#188a38" transform="rotate(15 195 90)"/>
        <rect x="193" y="90" width="12" height="4" fill="#188a38" transform="rotate(15 195 90)"/>
      </g>
      <g id="arms">
        <ellipse class="p-arm left" cx="50" cy="180" rx="18" ry="35" transform="rotate(20 50 180)" />
        <ellipse class="p-arm right" cx="190" cy="180" rx="18" ry="35" transform="rotate(-20 190 180)" />
      </g>
    </svg>
  </div>

  <div class="login-card">
    <div class="brand">Account Recovery</div>
    <div class="subtitle">Enter details to reset password</div>

    <div id="errorMsg" class="error-msg"></div>

    <form style="width: 100%;" onsubmit="handleReset(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required
               onfocus="setPandaState('watching')" 
               oninput="moveEyes(this.value)"
               onblur="setPandaState('idle')">
      </div>

      <div class="form-group">
        <label>Recovery Key</label>
        <input type="password" id="key" placeholder="••••" required
               onfocus="setPandaState('covering')" 
               onblur="setPandaState('idle')">
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newpass" required
               onfocus="setPandaState('covering')" 
               onblur="setPandaState('idle')">
      </div>

      <button class="brutalist-button" id="resetBtn">
        <div class="button-text" id="btnTextContainer">
          <span>RESET / </span>
          <span>PASSWORD</span>
        </div>
      </button>
    </form>

    <a href="login.html" class="back-link">← Back to Login</a>
  </div>

  <script>
    // PARTICLES
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = Math.random() * 4 + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (Math.random() * 10 + 5) + 's';
      particlesContainer.appendChild(p);
    }

    // PANDA LOGIC
    const guardian = document.getElementById('guardian');
    const pupils = document.getElementById('pupils');

    function setPandaState(state) {
      guardian.classList.remove('state-watching', 'state-covering', 'state-success');
      if (state !== 'idle') guardian.classList.add('state-' + state);
      else pupils.style.transform = `translate(0, 0)`;
    }

    function moveEyes(val) {
      const limit = 6;
      let x = (val.length % 20) - 10; 
      if (x > limit) x = limit; if (x < -limit) x = -limit;
      pupils.style.transform = `translate(${x}px, 6px)`;
    }

    // RESET LOGIC
    async function handleReset(event) {
      event.preventDefault();
      const btn = document.getElementById('resetBtn');
      const textContainer = document.getElementById('btnTextContainer');
      const errorDiv = document.getElementById('errorMsg');
      
      textContainer.innerHTML = '<span>SYSTEM / </span><span>UPDATING...</span>';
      btn.disabled = true;
      errorDiv.style.display = 'none';
      setPandaState('watching');

      const payload = {
        email: document.getElementById('email').value,
        recovery_key: document.getElementById('key').value,
        new_password: document.getElementById('newpass').value
      };

      try {
        const response = await fetch('api.php?action=reset_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();

        if (result.status === 'success') {
          textContainer.innerHTML = '<span>UPDATE / </span><span>SUCCESS</span>';
          btn.style.boxShadow = "6px 6px 0 #24a148";
          setPandaState('success');
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          errorDiv.innerText = result.message;
          errorDiv.style.display = 'block';
          textContainer.innerHTML = '<span>RESET / </span><span>PASSWORD</span>';
          btn.disabled = false;
          setPandaState('idle');
        }
      } catch (e) {
        errorDiv.innerText = "Connection Failed";
        errorDiv.style.display = 'block';
        textContainer.innerHTML = '<span>RETRY / </span><span>ACCESS</span>';
        btn.disabled = false;
        setPandaState('idle');
      }
    }
  </script>
</body>
</html>
