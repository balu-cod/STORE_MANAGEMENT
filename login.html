<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Trims</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* RESET & LAYOUT */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        font-family: 'Inter', sans-serif;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ddd;
    }

    /* BACKGROUND LAYER */
    .background-layer {
        position: fixed;
        top: -10px; left: -10px; right: -10px; bottom: -10px;
        background-image: url('logo.jpg'); /* Ensure this file exists */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: blur(8px) brightness(0.9);
        z-index: 0;
    }

    /* LOGIN CARD */
    .login-card {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        width: 90%;
        max-width: 400px;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: left;
        border: 1px solid rgba(255,255,255,0.5);
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    .header-text h2 { margin: 0; font-size: 22px; font-weight: 700; color: #333; }
    .header-text p { margin: 4px 0 0 0; font-size: 12px; color: #666; }
    .brand-logo { width: 60px; height: auto; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
        width: 100%; padding: 12px 14px;
        border: 1px solid #e0e0e0; border-radius: 8px;
        font-size: 14px; color: #333; background: #fdfdfd; transition: all 0.2s;
    }
    input:focus {
        border-color: #4c83fa; /* Matched to new button color */
        background: #fff; outline: none; box-shadow: 0 0 0 3px rgba(76, 131, 250, 0.1);
    }

    .error-msg {
        background: #fef2f2; color: #dc2626; font-size: 12px;
        padding: 10px; border-radius: 8px; margin-bottom: 20px;
        border: 1px solid #fecaca; display: none; text-align: center;
    }

    /* --- NEW ANIMATED BUTTON CSS (From Uiverse.io) --- */
    .star-button {
        position: relative;
        padding: 12px 35px;
        background: #4c83fa;
        font-size: 17px;
        font-weight: 900;
        color: #ffffff;
        border: 3px solid #4c83fa;
        border-radius: 8px;
        box-shadow: 0 0 0 #ffffff;
        transition: all 0.3s ease-in-out;
        cursor: pointer;
        width: 100%; /* Make full width for card */
        margin-top: 10px;
        overflow: hidden; /* Keep stars inside */
    }

    .star-1 { position: absolute; top: 20%; left: 20%; width: 25px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 1s cubic-bezier(0.05, 0.83, 0.43, 0.96); }
    .star-2 { position: absolute; top: 45%; left: 45%; width: 15px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 1s cubic-bezier(0, 0.4, 0, 1.01); }
    .star-3 { position: absolute; top: 40%; left: 40%; width: 5px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 1s cubic-bezier(0, 0.4, 0, 1.01); }
    .star-4 { position: absolute; top: 20%; left: 40%; width: 8px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 0.8s cubic-bezier(0, 0.4, 0, 1.01); }
    .star-5 { position: absolute; top: 25%; left: 45%; width: 15px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 0.6s cubic-bezier(0, 0.4, 0, 1.01); }
    .star-6 { position: absolute; top: 5%; left: 50%; width: 5px; height: auto; filter: drop-shadow(0 0 0 #4c83fa); z-index: -5; transition: all 0.8s ease; }

    .star-button:hover { background: transparent; color: #4c83fa; box-shadow: 0 0 0px #4c83fa; }
    .star-button:hover .star-1 { position: absolute; top: -80%; left: -30%; width: 25px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }
    .star-button:hover .star-2 { position: absolute; top: -0%; left: 10%; width: 15px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }
    .star-button:hover .star-3 { position: absolute; top: 55%; left: 25%; width: 5px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }
    .star-button:hover .star-4 { position: absolute; top: 30%; left: 80%; width: 8px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }
    .star-button:hover .star-5 { position: absolute; top: 25%; left: 115%; width: 15px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }
    .star-button:hover .star-6 { position: absolute; top: 5%; left: 60%; width: 5px; height: auto; filter: drop-shadow(0 0 0px #4c83fa); z-index: 2; }

    .fil0 { fill: #4c83fa; }
  </style>
</head>
<body>

  <div class="background-layer"></div>

  <div class="login-card">
    <div class="card-header">
        <div class="header-text">
            <h2>Welcome Back</h2>
            <p>Sign in to access Trims Inventory</p>
        </div>
        <img src="logo.jpg" alt="Logo" class="brand-logo">
    </div>

    <div id="errorBox" class="error-msg"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@company.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>

      <button type="submit" id="loginBtn" class="star-button">
        <span id="btnText">LOGIN</span>
        <div class="star-1">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
        <div class="star-2">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
        <div class="star-3">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
        <div class="star-4">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
        <div class="star-5">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
        <div class="star-6">
          <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd" viewBox="0 0 784.11 815.53" xmlns:xlink="http://www.w3.org/1999/xlink"><defs></defs><g id="Layer_x0020_1"><metadata id="CorelCorpID_0Corel-Layer"></metadata><path class="fil0" d="M392.05 0c-20.9,210.08 -184.06,378.41 -392.05,407.78 207.96,29.37 371.12,197.68 392.05,407.74 20.93,-210.06 184.09,-378.37 392.05,-407.74 -207.98,-29.38 -371.16,-197.69 -392.06,-407.78z"></path></g></svg>
        </div>
      </button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText'); // Target text inside the button
      const errBox = document.getElementById('errorBox');
      
      // Update only the text, not the stars
      btnText.innerText = "VERIFYING...";
      btn.style.opacity = "0.7";
      errBox.style.display = 'none';

      try {
        const response = await fetch('auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
              action: 'login', 
              email: document.getElementById('email').value, 
              password: document.getElementById('password').value 
          })
        });

        const text = await response.text();
        let result;
        try { result = JSON.parse(text); } catch (e) { throw new Error("Server Error"); }

        if (result.status === 'success') {
          btnText.innerText = "SUCCESS";
          // Change background to success green, but keep border/shadow styles
          btn.style.background = "#16a34a"; 
          btn.style.borderColor = "#16a34a";
          btn.style.color = "white";
          setTimeout(() => { window.location.href = 'inventory.html'; }, 500);
        } else {
          throw new Error(result.message || "Invalid Credentials");
        }
      } catch (error) {
        btnText.innerText = "LOGIN";
        btn.style.opacity = "1";
        // Reset to original button blue
        btn.style.background = "#4c83fa"; 
        btn.style.borderColor = "#4c83fa";
        btn.style.color = "white";
        errBox.innerText = "⚠️ " + error.message;
        errBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
