<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trims | Search & Manage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f62fe; --bg: #f4f7fc; --white: #fff; --text: #161616; --border: #e0e0e0; --danger: #da1e28; --success: #198038; }
    body { background: var(--bg); color: var(--text); padding-bottom: 100px; margin: 0; font-family: 'Inter', sans-serif; }
    .mobile-header { background: var(--white); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
    .main-content { padding: 24px; max-width: 1000px; margin: 0 auto; }
    .search-wrapper { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .search-input, .search-date { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: white; }
    .search-input { flex: 1; min-width: 120px; }
    .btn-search-main { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; height: 42px; }
    .btn-bulk-delete { padding: 0 20px; background: var(--danger); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: none; height: 42px; }
    .results-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { text-align: left; padding: 14px; background: #f9f9f9; font-size: 11px; color: #666; text-transform: uppercase; border-bottom: 1px solid #eee; }
    td { padding: 12px 14px; border-bottom: 1px solid #eee; font-size: 13px; }
    .act-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .act-Entry { background: #e6f7ff; color: #0043ce; }
    .act-Issue { background: #fff1f1; color: #da1e28; }
    .qty-plus { color: var(--success); font-weight: 700; }
    .qty-minus { color: var(--danger); font-weight: 700; }
    .qty-total { color: #333; font-weight: 800; background: #eee; padding: 4px 8px; border-radius: 4px; display: inline-block; }
    .sap-badge { background: #e8daff; color: #6929c4; font-weight: 800; padding: 4px 8px; border-radius: 4px; }
    .action-group { display: flex; gap: 4px; }
    .btn-action { padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; border: none; cursor: pointer; color: white; text-decoration: none; }
    .btn-delete { background: var(--danger); }
    .btn-view { background: #eef4ff; color: var(--primary); border: 1px solid #cce0ff; }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .nav-item { text-decoration: none; color: #888; font-size: 11px; font-weight: 600; text-align: center; }
    .nav-item.active { color: var(--primary); }
  </style>
</head>
<body onload="initSearch()">
  <header class="mobile-header">
    <div onclick="toggleMenu()" style="cursor:pointer; font-size: 20px;">☰</div>
    <div style="font-weight:800; color:var(--primary);">SEARCH & MANAGE</div>
    <div style="width:24px"></div>
  </header>

  <div class="main-content">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search Code or Loc...">
        <input type="date" id="dateInput" class="search-date">
        <button class="btn-search-main" onclick="fetchData()">🔍 Search</button>
        <button id="btnBulkDelete" class="btn-bulk-delete" onclick="deleteSelected()">🗑 Delete Selected</button>
    </div>

    <div class="results-card">
        <table>
            <thead>
                <tr>
                    <th style="width:40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                    <th>Action</th>
                    <th>Date</th>
                    <th>Code</th>
                    <th>Loc</th>
                    <th style="text-align:center;">Txn Qty</th>
                    <th style="text-align:center;">Physical</th>
                    <th style="text-align:center;">SAP Stock</th>
                    <th>User</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="results-body"><tr><td colspan="10" style="text-align:center; padding:30px;">Loading...</td></tr></tbody>
        </table>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">Home</a>
    <a href="entry.html" class="nav-item">Entry</a>
    <a href="issue.html" class="nav-item">Issue</a>
    <a href="search.html" class="nav-item active">Search</a>
  </nav>

  <script>
    let inventoryMap = {};

    async function initSearch() { await fetchData(); setInterval(fetchData, 10000); }

    async function fetchData() {
        try {
            const q = document.getElementById('searchInput').value.trim();
            const d = document.getElementById('dateInput').value;
            const resInv = await fetch('api.php?action=get_inventory');
            const invData = await resInv.json();
            
            inventoryMap = {};
            invData.forEach(i => { 
                const codeSafe = (i.code || "").toUpperCase();
                const locSafe = (i.loc || "").toUpperCase();
                inventoryMap[`${codeSafe}_${locSafe}`] = { qty: i.qty, sap: i.excel_stock }; 
            });

            const resLogs = await fetch(`api.php?action=get_transactions&q=${encodeURIComponent(q)}&date=${encodeURIComponent(d)}`);
            const logs = await resLogs.json();
            renderTable(logs);
        } catch(e) { console.error(e); }
    }

    function renderTable(data) {
        const tbody = document.getElementById('results-body');
        tbody.innerHTML = "";
        if(!data.length) { tbody.innerHTML = "<tr><td colspan='10' style='text-align:center; padding:30px;'>No results</td></tr>"; return; }
        
        data.forEach(item => {
            const codeSafe = (item.item_code || "").toUpperCase();
            const locSafe = (item.loc || "").toUpperCase();
            const key = `${codeSafe}_${locSafe}`;
            const stock = inventoryMap[key] || { qty: 0, sap: 0 };
            const qtyClass = item.action_type === 'Entry' ? "qty-plus" : "qty-minus";
            const qtySign = item.action_type === 'Entry' ? "+" : "-";

            tbody.innerHTML += `
            <tr>
                <td><input type="checkbox" class="row-chk" value="${item.id}" onclick="toggleBulkButton()"></td>
                <td><span class="act-badge act-${item.action_type}">${item.action_type}</span></td>
                <td style="font-size:11px;">${item.timestamp}</td>
                <td><b>${item.item_code}</b></td>
                <td>${item.loc}</td>
                <td style="text-align:center;" class="${qtyClass}">${qtySign}${item.txn_qty}</td>
                <td style="text-align:center;"><span class="qty-total">${stock.qty}</span></td>
                <td style="text-align:center;"><span class="sap-badge">${stock.sap}</span></td>
                <td>${item.user}</td>
                <td>
                    <div class="action-group">
                        <button class="btn-action btn-view" onclick="location.href='bincard.html?code=${item.item_code}'">View</button>
                        <button class="btn-action btn-delete" onclick="deleteLog(${item.id})">Delete</button>
                    </div>
                </td>
            </tr>`;
        });
    }

    function toggleSelectAll() {
        const checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('.row-chk').forEach(c => c.checked = checked);
        toggleBulkButton();
    }

    function toggleBulkButton() {
        const count = document.querySelectorAll('.row-chk:checked').length;
        document.getElementById('btnBulkDelete').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('btnBulkDelete').innerText = `🗑 Delete (${count})`;
    }

    async function deleteLog(id) {
        if(!confirm("Delete this log?") || prompt("PIN:") !== "1234") return;
        await fetch('api.php', { method: 'POST', body: JSON.stringify({ action: 'delete_log_bulk', ids: [id] }) });
        fetchData();
    }

    async function deleteSelected() {
        const ids = Array.from(document.querySelectorAll('.row-chk:checked')).map(c => c.value);
        if(!confirm(`Delete ${ids.length} logs?`) || prompt("PIN:") !== "1234") return;
        await fetch('api.php', { method: 'POST', body: JSON.stringify({ action: 'delete_log_bulk', ids: ids }) });
        fetchData();
    }
  </script>
</body>
</html>
