<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Trims</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* RESET & LAYOUT */
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        font-family: 'Inter', sans-serif;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ddd; /* Fallback color if image fails */
    }

    /* 1. BLURRED BACKGROUND IMAGE LAYER */
    .background-layer {
        position: fixed;
        top: -10px; left: -10px; right: -10px; bottom: -10px;
        background-image: url('1000019843.jpg'); /* ENSURE THIS FILENAME IS CORRECT */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: blur(8px) brightness(0.9); /* Blur and slightly darken */
        z-index: 0; /* Behind everything */
    }

    /* 2. LOGIN CARD */
    .login-card {
        position: relative;
        z-index: 10; /* Above background */
        background: rgba(255, 255, 255, 0.85); /* Semi-transparent white */
        backdrop-filter: blur(10px); /* Frosted glass effect */
        width: 90%;
        max-width: 400px;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: left;
        border: 1px solid rgba(255,255,255,0.5);
    }

    /* HEADER SECTION (Text Left + Logo Right) */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }
    .header-text h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        color: #333;
    }
    .header-text p {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: #666;
    }
    
    /* LOGO INSIDE CARD */
    .brand-logo {
        width: 60px; /* Size of the logo inside card */
        height: auto;
        border-radius: 4px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* FORM STYLES */
    .form-group { margin-bottom: 16px; }
    
    label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #555;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        color: #333;
        background: #fdfdfd;
        transition: all 0.2s;
    }
    input:focus {
        border-color: #c7202c; /* Brand Red */
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 3px rgba(199, 32, 44, 0.1);
    }

    /* LOGIN BUTTON */
    .btn-login {
        width: 100%;
        padding: 14px;
        background-color: #c7202c; /* Aditya Birla Red */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 10px;
    }
    .btn-login:hover {
        background-color: #a81822;
    }

    /* ERROR MESSAGE */
    .error-msg {
        background: #fef2f2;
        color: #dc2626;
        font-size: 12px;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid #fecaca;
        display: none;
        text-align: center;
    }
  </style>
</head>
<body>

  <div class="background-layer"></div>

  <div class="login-card">
    
    <div class="card-header">
        <div class="header-text">
            <h2>Welcome Back</h2>
            <p>Sign in to access Trims Inventory</p>
        </div>
        <img src="1000019843.jpg" alt="Logo" class="brand-logo">
    </div>

    <div id="errorBox" class="error-msg"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@company.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Login</button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errBox = document.getElementById('errorBox');
      
      btn.innerText = "VERIFYING...";
      btn.style.opacity = "0.7";
      errBox.style.display = 'none';

      try {
        const response = await fetch('auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
              action: 'login', 
              email: document.getElementById('email').value, 
              password: document.getElementById('password').value 
          })
        });

        const text = await response.text();
        let result;
        try { result = JSON.parse(text); } catch (e) { throw new Error("Server Error"); }

        if (result.status === 'success') {
          btn.innerText = "SUCCESS";
          btn.style.backgroundColor = "#16a34a"; 
          setTimeout(() => { window.location.href = 'inventory.html'; }, 500);
        } else {
          throw new Error(result.message || "Invalid Credentials");
        }
      } catch (error) {
        btn.innerText = "LOGIN";
        btn.style.opacity = "1";
        btn.style.backgroundColor = "#c7202c";
        errBox.innerText = "⚠️ " + error.message;
        errBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
