<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trims | Smart Router</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7fc; margin: 0; }
        .loader { border: 4px solid #e0e0e0; border-top: 4px solid #0f62fe; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .msg { font-weight: 600; font-size: 18px; color: #555; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="msg">Redirecting...</div>

    <script>
        // ===============================================
        //  CONFIGURATION
        // ===============================================
        
        const PAGES = {
            RACK: "qr_rack.html",
            BIN:  "qr_bin.html",
            BOX:  "qr_box.html"
        };

        function processScan() {
            const params = new URLSearchParams(window.location.search);
            // Accepts 'id' or 'code' from the QR link
            const id = params.get('id') || params.get('code'); 

            if(!id) {
                document.body.innerHTML = "<h3 style='color:red; text-align:center;'>⚠️ Error: No ID Found</h3>";
                return;
            }

            // 1. CLEAN THE ID
            // Removes words like "BIN", "BOX" to get the pure code (e.g., "A1" or "A101")
            let cleanId = id.toUpperCase()
                .replace(/RACK|BIN|BOX|MASTER/g, "") 
                .replace(/[^A-Z0-9]/g, "");          

            let targetUrl = "";
            
            // 2. IDENTIFY TYPE BASED ON DIGITS
            let digitCount = (cleanId.match(/\d/g) || []).length;

            if (digitCount === 0) {
                // CASE: Series/Rack (e.g. "A")
                targetUrl = `${PAGES.RACK}?series=${cleanId}`;
            } 
            else if (digitCount < 3) {
                // CASE: Bin (e.g. "A1") -> Uses ?rack= parameter
                targetUrl = `${PAGES.BIN}?rack=${cleanId}`;
            } 
            else {
                // CASE: Box (e.g. "A101") -> Uses ?code= parameter
                targetUrl = `${PAGES.BOX}?code=${cleanId}`;
            }

            // 3. EXECUTE REDIRECT
            setTimeout(() => { window.location.replace(targetUrl); }, 300);
        }

        processScan();
    </script>
</body>
</html>
